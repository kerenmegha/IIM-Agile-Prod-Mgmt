<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Manager</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header__text">
        <h1>Task Manager</h1>
        <p class="subtitle">Stay organized, one task at a time.</p>
      </div>
      <div class="stats" aria-live="polite">
        <span id="active-count">0 active</span>
        <span class="stats__divider">·</span>
        <span id="done-count">0 done</span>
      </div>
    </header>

    <div class="layout">
      <section class="calendar-panel" aria-label="Calendar">
        <div class="calendar-header">
          <button type="button" id="prev-month" class="calendar-nav" aria-label="Previous month">‹</button>
          <h2 id="calendar-title" class="calendar-title"></h2>
          <button type="button" id="next-month" class="calendar-nav" aria-label="Next month">›</button>
        </div>
        <div class="calendar-weekdays" aria-hidden="true">
          <span>Su</span><span>Mo</span><span>Tu</span><span>We</span><span>Th</span><span>Fr</span><span>Sa</span>
        </div>
        <div id="calendar-grid" class="calendar-grid" role="grid" aria-label="Calendar days"></div>
        <div class="calendar-footer">
          <button type="button" id="today-btn" class="calendar-action">Today</button>
          <button type="button" id="clear-date-btn" class="calendar-action" hidden>Clear date filter</button>
        </div>
        <p id="selected-date-label" class="selected-date-label" hidden></p>
      </section>

      <section class="tasks-panel">
        <form id="task-form" class="task-form" autocomplete="off">
          <input
            id="task-input"
            type="text"
            placeholder="What needs to be done?"
            aria-label="New task"
            maxlength="200"
            required
          >
          <input
            id="task-date"
            type="date"
            aria-label="Due date"
            title="Due date (optional)"
          >
          <button type="submit">Add task</button>
        </form>

        <div class="toolbar">
          <div class="filters" role="tablist" aria-label="Filter tasks">
            <button type="button" class="filter active" data-filter="all">All</button>
            <button type="button" class="filter" data-filter="active">Active</button>
            <button type="button" class="filter" data-filter="done">Done</button>
          </div>
          <button type="button" id="clear-done" class="clear-done" hidden>Clear completed</button>
        </div>

        <ul id="task-list" class="task-list" aria-label="Tasks"></ul>

        <p id="empty-state" class="empty-state">No tasks yet. Add one above to get started.</p>
      </section>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
